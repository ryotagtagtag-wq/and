<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOSP Files 起動ツール</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .btn {
            display: inline-block;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <a class="btn" href="intent:#Intent;action=android.intent.action.OPEN_DOCUMENT_TREE;end">
        標準ファイルアプリを開く
    </a>

</body>
</html>
